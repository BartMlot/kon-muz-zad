<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ticket Sales</title>
    <style>
        body { font-family: sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #f0f0f0; }
        .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .filters label { display: flex; flex-direction: column; font-size: 0.85rem; gap: 0.2rem; }
        .error { color: red; }
        .pagination { display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem; }
        .pagination button { padding: 0.3rem 0.75rem; cursor: pointer; }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>

<h1>Lista eventów</h1>

<div class="filters">
    <label>Miasto
        <input type="text" id="city" placeholder="np. Warszawa">
    </label>
    <label>Data od
        <input type="date" id="dateFrom">
    </label>
    <label>Data do
        <input type="date" id="dateTo">
    </label>
    <label>Kategoria
        <select id="category">
            <option value="">Wszystkie</option>
            <option value="kids">Kids</option>
            <option value="adults">Adults</option>
        </select>
    </label>
    <label style="justify-content: flex-end">
        <button onclick="loadEvents()">Filtruj</button>
    </label>
</div>

<div id="events-container"><p>Ładowanie...</p></div>

<h2 style="margin-top: 2rem">Top 10 kampanii UTM (wszystkie statusy)</h2>
<div id="utm-container"><p>Ładowanie...</p></div>

<h2 style="margin-top: 2rem">Top 10 kampanii UTM (tylko confirmed)</h2>
<div id="utm-confirmed-container"><p>Ładowanie...</p></div>

<script src="app.js"></script>
</body>
</html>
